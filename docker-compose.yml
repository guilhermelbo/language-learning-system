services:
  stt:
    build:
      context: ./ai_services/stt
      dockerfile: Dockerfile
    container_name: lingo-stt
    ports:
      - "8001:8001"
    restart: unless-stopped

  tts:
    build:
      context: ./ai_services/tts
      dockerfile: Dockerfile
    container_name: lingo-tts
    ports:
      - "8002:8002"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lingo-backend
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-openai_compatible}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-Qwen3.5-35B-A3B-UD-IQ3_S.gguf}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://llamacpp:8080/v1}
      - STT_API_URL=http://stt:8001
      - TTS_API_URL=http://tts:8002
      - PIPER_MODEL_PATH=pt_BR-faber-medium.onnx
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lingo-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
